<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片下载助手</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>图片下载助手</h1>
          <p id="current-site">正在识别当前页面</p>
        </div>
        <div class="count" id="selected-count">0</div>
      </header>

      <nav class="tabs" aria-label="主导航">
        <button class="tab active" data-tab="sites" type="button">站点</button>
        <button class="tab" data-tab="settings" type="button">设置</button>
        <button class="tab" data-tab="donate" type="button">打赏</button>
      </nav>

      <section class="panel active" id="tab-sites">
        <div class="actions">
          <button type="button" data-command="select-visible">选择当前屏幕</button>
          <button type="button" data-command="clear">清空选择</button>
          <button type="button" data-command="copy-links">复制图片链接</button>
        </div>
        <div class="download-row">
          <select id="download-mode" aria-label="下载方式">
            <option value="zip">打包为 ZIP</option>
            <option value="direct">逐张下载原图</option>
            <option value="links">保存链接文本</option>
          </select>
          <button class="primary" type="button" data-command="download">开始下载</button>
        </div>
        <div class="site-list" id="site-list"></div>
      </section>

      <section class="panel" id="tab-settings">
        <label class="switch-row">
          <span>
            <strong>网页快捷栏</strong>
            <small>在网页右下角显示选择数和下载按钮</small>
          </span>
          <input type="checkbox" id="show-mini-panel">
        </label>
        <label class="switch-row">
          <span>
            <strong>图片选择按钮</strong>
            <small>鼠标移到图片上时显示选择按钮</small>
          </span>
          <input type="checkbox" id="show-hover-buttons">
        </label>
        <label class="switch-row">
          <span>
            <strong>键盘快捷键</strong>
            <small>S 选择鼠标下图片，A 选择当前屏幕，D 下载，C 清空</small>
          </span>
          <input type="checkbox" id="enable-shortcuts">
        </label>
        <label class="field">
          <span>默认下载方式</span>
          <select id="default-download-mode">
            <option value="zip">打包为 ZIP</option>
            <option value="direct">逐张下载原图</option>
            <option value="links">保存链接文本</option>
          </select>
        </label>
      </section>

      <section class="panel donate" id="tab-donate">
        <section class="author-section" aria-labelledby="author-title">
          <div class="author-copy">
            <span class="section-kicker">作者</span>
            <h2 id="author-title">打赏作者</h2>
            <p>这个扩展会继续围绕图片选择、批量下载和多站点适配优化。愿意支持的话，可以任选一种方式扫码。</p>
          </div>
          <aside class="support-panel" aria-label="打赏作者">
            <div class="support-copy">
              <span class="section-kicker">支持开发</span>
              <h3>一点维护经费</h3>
              <p>微信或算力赞赏，任选一种。</p>
            </div>
            <div class="support-qr-list">
              <figure class="support-qr">
                <div class="qr-frame">
                  <img src="../assets/donate-wechat.png" alt="微信打赏作者二维码" width="220" height="220">
                  <span class="qr-missing">放入 donate-wechat.png</span>
                </div>
                <figcaption>微信</figcaption>
              </figure>
              <figure class="support-qr">
                <div class="qr-frame">
                  <img src="../assets/donate-compute.png" alt="算力赞赏作者二维码" width="220" height="220">
                  <span class="qr-missing">放入 donate-compute.png</span>
                </div>
                <figcaption>算力赞赏</figcaption>
              </figure>
            </div>
          </aside>
        </section>
      </section>

      <footer id="status">等待选择图片</footer>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
